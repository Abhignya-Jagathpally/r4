# Graph ML config
model:
  type: "gat"
  hidden_dim: 128
  n_layers: 3
  n_heads: 4
  dropout: 0.2
  edge_dim: 4

training:
  loss_function: "mse"  # M45: from config
  early_stop_metric: "val_loss"  # M46
  n_epochs: 100
  lr: 0.001
  batch_size: 32
  patience: 10

  # M51: multi-task loss weights
  task_weights:
    sensitivity: 1.0
    selectivity: 0.3

frozen_preprocessing: true  # M47: enforce with assertions

hpo:
  n_trials: 30
  timeout: 600
