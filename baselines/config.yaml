# Baselines config (M29: enforces nested CV, M33: no magic numbers)
biomarker_ranking:
  outer_folds: 5       # M29: outer loop for unbiased evaluation
  inner_folds: 3       # M29: inner loop for HP tuning
  l1_ratios: [0.1, 0.5, 0.7, 0.9, 0.95]  # M33: configurable
  random_state: 42
  z_threshold: 1.96    # M33: configurable CI z-value

survival:
  penalizer: 0.1
  time_horizons: [12, 24, 36, 60]
  bootstrap_n: 2000

drug_sensitivity:
  outer_folds: 5
  inner_folds: 3
  models: ["elasticnet", "rf", "xgboost"]

evaluation:
  bootstrap_n: 2000
  ci_level: 0.95
  ci_method: "BCa"     # M25: BCa instead of percentile
